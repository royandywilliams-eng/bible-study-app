<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- App Title and Description -->
    <title>Bible Study App - For New Christians</title>
    <meta name="description" content="A comprehensive Bible study app with full Bible reading, devotionals, study guides, and personal notes. Perfect for new Christians learning Scripture." />

    <!-- Favicon and Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%232563eb' width='180' height='180' rx='39'/><text x='90' y='90' font-size='90' font-weight='bold' text-anchor='middle' dominant-baseline='central' fill='white' font-family='Arial'>📖</text></svg>" />

    <!-- Viewport and Mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bible Study" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph / Social Meta Tags -->
    <meta property="og:title" content="Bible Study App - For New Christians" />
    <meta property="og:description" content="Complete Bible study app with full Bible, devotionals, study guides, and personal notes." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bible-study-app.example.com" />
    <meta property="og:image" content="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 630'><rect fill='%232563eb' width='1200' height='630'/><text x='600' y='200' font-size='80' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'>Bible Study App</text><text x='600' y='350' font-size='48' text-anchor='middle' fill='white' font-family='Arial'>For New Christians</text><text x='600' y='500' font-size='32' text-anchor='middle' fill='white' font-family='Arial'>📖 Read • 🎓 Study • 💭 Reflect</text></svg>" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bible Study App - For New Christians" />
    <meta name="twitter:description" content="Complete Bible study app with full Bible, devotionals, study guides, and personal notes." />

    <!-- Preconnect and Prefetch -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- Color Scheme -->
    <meta name="color-scheme" content="light dark" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/service-worker.js')
            .then((registration) => {
              console.log('Service Worker registered:', registration);
            })
            .catch((error) => {
              console.error('Service Worker registration failed:', error);
            });
        });
      }

      // Handle app installation prompt
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        console.log('App can be installed');
      });

      window.addEventListener('appinstalled', () => {
        console.log('App was installed');
        deferredPrompt = null;
      });

      // Make deferredPrompt available globally for install button
      window.deferredPrompt = () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
              console.log('User accepted install prompt');
            } else {
              console.log('User dismissed install prompt');
            }
          });
        }
      };
    </script>
  </body>
</html>
